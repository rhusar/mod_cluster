# Czech (cs) translations for ModClusterLogger
#
# suppress inspection "UnusedProperty" for whole file
#
# Translation notes:
# - Technical identifiers are never translated: jvm-route, connectorPort, connectorAddress, mod_cluster, engine, host, context
# - English networking terms are adapted with Czech morphology where natural:
#   "multicast socket" -> "multicastový socket", "unicast address" -> "unicastová adresa"
# - "IP stack" is translated as "sada protokolů IP"
# - "cross-talking" is translated as "přeslech"
# - "session" is translated as "relace", "request" as "požadavek", "connector" as "konektor"
# - "drain" is translated as "odčerpat/odčerpávání"
# - "advertise" (the mod_cluster discovery mechanism) is translated as "oznámení" (announcement)
# - "load metric" is translated as "metrika zátěže"
# - "certificate revocation list" is translated as "seznam odvolaných certifikátů"
# - Log message IDs (MODCLUSTER000xxx) are prepended automatically by the annotation processor
#
# Id: none
# Level: DEBUG
# Message: Catching
catchingDebug=Zachyceno
